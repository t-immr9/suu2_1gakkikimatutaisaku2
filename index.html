<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#0d1b3e 50%,#0a0a1a 100%);min-height:100vh;color:#fff;}
.hidden{display:none!important;}
#app{position:relative;max-width:700px;margin:0 auto;padding:12px;}

/* タイトル */
#sTitle{text-align:center;padding:40px 20px;}
.title-icon{font-size:72px;display:inline-block;animation:float 2.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
.title-main{font-size:1.6em;font-weight:900;color:#fff;margin:20px 0 8px;text-shadow:0 0 20px #7c3aed;}
.title-sub{font-size:0.95em;color:#c4b5fd;margin-bottom:24px;}
.title-info{background:rgba(124,58,237,0.15);border:1px solid #7c3aed;border-radius:12px;padding:16px;margin-bottom:28px;text-align:left;font-size:0.88em;color:#ddd6fe;line-height:1.8;}
.title-info li{margin:2px 0 2px 16px;}
.btn-start{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:12px;padding:16px 48px;font-size:1.15em;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;box-shadow:0 4px 20px rgba(124,58,237,0.5);transition:transform .15s,box-shadow .15s;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(124,58,237,0.7);}

/* ゲーム画面 */
#sGame{padding-bottom:20px;}
.status-bar{position:sticky;top:0;z-index:100;background:rgba(10,10,26,0.97);backdrop-filter:blur(8px);border-bottom:1px solid rgba(124,58,237,0.3);padding:10px 14px;}
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.stat-label{font-size:0.72em;color:#c4b5fd;min-width:32px;}
.bar-wrap{flex:1;background:rgba(255,255,255,0.1);border-radius:99px;height:10px;overflow:hidden;}
.bar-hp{height:100%;border-radius:99px;transition:width .4s;}
.bar-exp{height:100%;border-radius:99px;background:linear-gradient(90deg,#a78bfa,#7c3aed);transition:width .4s;}
.stat-num{font-size:0.75em;color:#e9d5ff;min-width:54px;text-align:right;}
.lv-badge{font-size:0.78em;background:rgba(124,58,237,0.35);border:1px solid #7c3aed;border-radius:8px;padding:2px 8px;color:#ddd6fe;white-space:nowrap;}
.score-badge{font-size:0.78em;color:#fde68a;margin-left:auto;white-space:nowrap;}
.progress-dots{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background .3s;}
.dot.ok{background:#22c55e;}
.dot.ng{background:#ef4444;}
.dot.cur{background:#fbbf24;box-shadow:0 0 6px #fbbf24;}

/* 問題カード */
.q-card{background:rgba(15,15,40,0.85);border:1px solid rgba(124,58,237,0.3);border-radius:16px;margin-top:14px;overflow:hidden;}
.q-card-top{height:3px;background:linear-gradient(90deg,#7c3aed,#4f46e5,#06b6d4);}
.q-head{padding:12px 16px 0;display:flex;justify-content:space-between;align-items:center;}
.q-num{font-size:0.82em;color:#c4b5fd;}
.q-body{padding:14px 16px;}
.q-text{font-size:1.0em;line-height:1.85;color:#fff;margin-bottom:16px;}
.choices{display:flex;flex-direction:column;gap:10px;}
.choice-btn{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:12px 14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:0.95em;color:#fff;text-align:left;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s,background .15s;line-height:1.7;}
.choice-btn:hover:not(:disabled){border-color:#a78bfa;background:rgba(124,58,237,0.2);}
.choice-btn:disabled{cursor:default;}
.choice-btn.correct{border-color:#22c55e!important;background:rgba(34,197,94,0.2)!important;}
.choice-btn.wrong{border-color:#ef4444!important;background:rgba(239,68,68,0.2)!important;}
.badge{display:inline-block;min-width:26px;height:26px;line-height:26px;text-align:center;border-radius:6px;font-size:0.82em;font-weight:700;flex-shrink:0;margin-top:2px;}
.badge-a{background:#7c3aed;}
.badge-b{background:#0891b2;}
.badge-c{background:#059669;}
.badge-d{background:#d97706;}
.choice-text{flex:1;}

/* 解説 */
.expl{border-radius:10px;padding:14px;margin-top:14px;font-size:0.9em;line-height:1.85;}
.expl.ok{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.4);}
.expl.ng{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.4);}
.expl-title{font-weight:700;margin-bottom:8px;font-size:1.0em;}
.expl.ok .expl-title{color:#4ade80;}
.expl.ng .expl-title{color:#f87171;}
.expl-body{color:#e2e8f0;}

.flash{animation:flash .35s;}
@keyframes flash{0%,100%{background:rgba(15,15,40,0.85);}50%{background:rgba(239,68,68,0.35);}}

.btn-next{display:block;width:100%;margin-top:14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:10px;padding:14px;font-size:1.0em;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity .15s;}
.btn-next:hover{opacity:.88;}

/* ポップアップ */
.popup{position:absolute;pointer-events:none;font-weight:900;font-size:1.3em;animation:popUp .9s ease-out forwards;z-index:200;}
.popup.exp{color:#fbbf24;text-shadow:0 2px 8px #92400e;}
.popup.dmg{color:#f87171;text-shadow:0 2px 8px #7f1d1d;}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1);}80%{opacity:.8;transform:translateY(-50px) scale(1.2);}100%{opacity:0;transform:translateY(-80px) scale(.8);}}

/* レベルアップ画面 */
#sLvUp{text-align:center;padding:60px 20px;}
.lvup-stars{font-size:2.5em;margin-bottom:16px;animation:spinY 1.5s linear infinite;}
@keyframes spinY{0%{transform:rotateY(0deg);}100%{transform:rotateY(360deg);}}
.lvup-title{font-size:2em;font-weight:900;color:#fbbf24;text-shadow:0 0 30px #fbbf24;margin-bottom:12px;}
.lvup-name{font-size:1.3em;color:#e9d5ff;margin-bottom:8px;}
.lvup-skill{font-size:0.95em;color:#a78bfa;margin-bottom:32px;}
.btn-cont{background:linear-gradient(135deg,#059669,#0891b2);color:#fff;border:none;border-radius:12px;padding:14px 40px;font-size:1.05em;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

/* リザルト */
#sResult{text-align:center;padding:40px 16px;}
.result-icon{font-size:56px;margin-bottom:12px;}
.result-title{font-size:1.5em;font-weight:900;color:#fbbf24;margin-bottom:8px;}
.result-round{font-size:0.88em;color:#c4b5fd;margin-bottom:20px;}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.stat-box{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.35);border-radius:12px;padding:16px;}
.stat-box-val{font-size:2em;font-weight:900;color:#fbbf24;}
.stat-box-label{font-size:0.78em;color:#c4b5fd;margin-top:4px;}
.btn-next-round{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:12px;padding:16px 32px;font-size:1.0em;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;width:100%;box-shadow:0 4px 18px rgba(124,58,237,0.45);}
</style>
</head>
<body>
<div id="app">

<!-- タイトル画面 -->
<div id="sTitle">
  <div class="title-icon">📐</div>
  <div class="title-main">数学Ⅱ　１学期期末対策α</div>
  <div class="title-sub">〜 賢者への道 RPGクイズ 〜</div>
  <div class="title-info">
    <ul>
      <li>全29問・3周制（1周9〜10問）</li>
      <li>2次方程式の解の対称式 / 高次方程式 / 数直線・座標平面 / 直線の方程式 / 円の方程式</li>

    </ul>

</div>

<!-- ゲーム画面 -->
<div id="sGame" class="hidden">
  <div class="status-bar">
    <div class="stat-row">
      <span class="stat-label">HP</span>
      <div class="bar-wrap"><div class="bar-hp" id="bHp" style="width:100%"></div></div>

    </div>

      <span class="stat-label">EXP</span>

      <span class="stat-num" id="nExp">0/100</span>

</div>

<!-- レベルアップ画面 -->
<div id="sLvUp" class="hidden">
  <div class="lvup-stars">✨</div>
  <div class="lvup-title" id="lut">Lv2 に昇格！</div>
  <div class="lvup-name" id="lub">称号</div>
  <div class="lvup-skill" id="lusk">新スキル</div>
  <button class="btn-cont" onclick="dismissLv()">✦ 続ける</button>
</div>

<!-- リザルト画面 -->
<div id="sResult" class="hidden">
  <div class="result-icon" id="resIcon">🏆</div>
  <div class="result-title" id="resTitle">周回クリア！</div>
  <div class="result-round" id="resRound"></div>
  <div class="result-stats">
    <div class="stat-box"><div class="stat-box-val" id="resScore">0</div><div class="stat-box-label">スコア</div></div>
    <div class="stat-box"><div class="stat-box-val" id="resOk">0</div><div class="stat-box-label">正解数</div></div>
    <div class="stat-box"><div class="stat-box-val" id="resAcc">0%</div><div class="stat-box-label">正答率</div></div>
    <div class="stat-box"><div class="stat-box-val" id="resHp">0</div><div class="stat-box-label">残りHP</div></div>
  </div>
  <button class="btn-next-round" id="btnNextRound" onclick="onResult()"></button>
</div>

</div><!-- #app -->

<script>
// ============================================================
// 問題データ（PDFの問題・選択肢・解答をそのまま収録）
// ============================================================
// 選択肢の並びはPDFの(1)(2)(3)(4)順。a:は正解のインデックス(0始まり)
const AQ = [

// ======== 問1 ======== 2次方程式の解の対称式[ポイントノート数学Ⅱ 問題40]
// 2次方程式 x²−4x+5=0 の2つの解をα,βとするとき，次の値を求めよ。
// (1)α+β  (2)αβ  (3)α²β+αβ²  (4)α²+β²
// 解答：(1)4  (2)5  (3)20  (4)6
// →4択：「(1)の値は？」「(2)の値は？」など小問を分けるか，
//   小問すべての解答セットを選ばせる形にする
{
  q:'2次方程式 \\(x^2-4x+5=0\\) の2つの解を \\(\\alpha, \\beta\\) とするとき，\\(\\alpha+\\beta\\) の値を求めよ。',
  c:['4', '5', '−4', '−5'],
  a:0,
  e:'解と係数の関係より \\(\\alpha+\\beta = -\\dfrac{-4}{1} = 4\\)。'
},
{
  q:'2次方程式 \\(x^2-4x+5=0\\) の2つの解を \\(\\alpha, \\beta\\) とするとき，\\(\\alpha\\beta\\) の値を求めよ。',
  c:['5', '4', '−4', '20'],
  a:0,
  e:'解と係数の関係より \\(\\alpha\\beta = \\dfrac{5}{1} = 5\\)。'
},
{
  q:'2次方程式 \\(x^2-4x+5=0\\) の2つの解を \\(\\alpha, \\beta\\) とするとき，\\(\\alpha^2\\beta+\\alpha\\beta^2\\) の値を求めよ。',
  c:['20', '6', '5', '4'],
  a:0,
  e:'\\(\\alpha^2\\beta+\\alpha\\beta^2 = \\alpha\\beta(\\alpha+\\beta) = 5 \\times 4 = 20\\)。'
},
{
  q:'2次方程式 \\(x^2-4x+5=0\\) の2つの解を \\(\\alpha, \\beta\\) とするとき，\\(\\alpha^2+\\beta^2\\) の値を求めよ。',
  c:['6', '20', '16', '5'],
  a:0,
  e:'\\(\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 4^2 - 2\\times5 = 16-10 = 6\\)。'
},

// ======== 問2 ======== 2次方程式の解の対称式[ポイントノート数学Ⅱ 例17]
// 2次方程式 x²+4x+3=0 の2つの解をα,βとするとき，次の値を求めよ。
// (1)α+β  (2)αβ  (3)α²β+αβ²  (4)α²+β²
// 解答：(1)−4  (2)3  (3)−12  (4)10
{
  q:'2次方程式 \\(x^2+4x+3=0\\) の2つの解を \\(\\alpha, \\beta\\) とするとき，\\(\\alpha^2\\beta+\\alpha\\beta^2\\) の値を求めよ。',
  c:['−12', '12', '10', '−10'],
  a:0,
  e:'\\(\\alpha+\\beta=-4\\)，\\(\\alpha\\beta=3\\)。\\(\\alpha^2\\beta+\\alpha\\beta^2=\\alpha\\beta(\\alpha+\\beta)=3\\times(-4)=-12\\)。'
},
{
  q:'2次方程式 \\(x^2+4x+3=0\\) の2つの解を \\(\\alpha, \\beta\\) とするとき，\\(\\alpha^2+\\beta^2\\) の値を求めよ。',
  c:['10', '−12', '16', '6'],
  a:0,
  e:'\\(\\alpha+\\beta=-4\\)，\\(\\alpha\\beta=3\\)。\\(\\alpha^2+\\beta^2=(\\alpha+\\beta)^2-2\\alpha\\beta=(-4)^2-2\\times3=16-6=10\\)。'
},

// ======== 問3 ======== P(x)の値[ポイントノート数学Ⅱ 問題47]
// P(x)=x³−x²−4 のとき，次の値を求めよ。
// (1)P(1)  (2)P(−1)  (3)P(2)  (4)P(−2)
// 解答：(1)−4  (2)−6  (3)0  (4)−16
{
  q:'\\(P(x)=x^3-x^2-4\\) のとき，\\(P(1)\\) の値を求めよ。',
  c:['−4', '−6', '0', '−16'],
  a:0,
  e:'\\(P(1)=1^3-1^2-4=1-1-4=-4\\)。'
},
{
  q:'\\(P(x)=x^3-x^2-4\\) のとき，\\(P(-1)\\) の値を求めよ。',
  c:['−6', '−4', '0', '−16'],
  a:0,
  e:'\\(P(-1)=(-1)^3-(-1)^2-4=-1-1-4=-6\\)。'
},
{
  q:'\\(P(x)=x^3-x^2-4\\) のとき，\\(P(2)\\) の値を求めよ。',
  c:['0', '−4', '−6', '−16'],
  a:0,
  e:'\\(P(2)=2^3-2^2-4=8-4-4=0\\)。'
},

// ======== 問4 ======== 3次方程式の解法：共通因数でくくる，因数分解の公式利用[問題51]
// 次の3次方程式を解け。
// (1) x³+x²−2x=0  (2) x³−27=0
// 解答：(1)x=0,1,−2  (2)x=3, (−3±3√3i)/2
{
  q:'3次方程式 \\(x^3+x^2-2x=0\\) を解いたとき，解の組合せとして正しいものを選べ。',
  c:['\\(x=0, 1, -2\\)', '\\(x=0, -1, 2\\)', '\\(x=1, -1, 2\\)', '\\(x=0, 1, 2\\)'],
  a:0,
  e:'\\(x(x^2+x-2)=0\\)，\\(x(x-1)(x+2)=0\\)，よって \\(x=0, 1, -2\\)。'
},
{
  q:'3次方程式 \\(x^3-27=0\\) を解いたとき，解の組合せとして正しいものを選べ。',
  c:['\\(x=3,\\ \\dfrac{-3\\pm3\\sqrt{3}\\,i}{2}\\)', '\\(x=3,\\ \\dfrac{3\\pm3\\sqrt{3}\\,i}{2}\\)', '\\(x=-3,\\ \\dfrac{3\\pm3\\sqrt{3}\\,i}{2}\\)', '\\(x=\\pm3\\)'],
  a:0,
  e:'\\((x-3)(x^2+3x+9)=0\\)。\\(x=3\\) または \\(x=\\dfrac{-3\\pm\\sqrt{9-36}}{2}=\\dfrac{-3\\pm3\\sqrt{3}\\,i}{2}\\)。'
},

// ======== 問5 ======== 4次方程式の解法：複2次式[問題52]
// 次の4次方程式を解け。
// (1) x⁴+5x²=0  (2) x⁴−x²−20=0
// 解答：(1)x=0, ±√5 i  (2)x=±√5, ±2i
{
  q:'4次方程式 \\(x^4+5x^2=0\\) を解いたとき，解の組合せとして正しいものを選べ。',
  c:['\\(x=0,\\ \\pm\\sqrt{5}\\,i\\)', '\\(x=0,\\ \\pm\\sqrt{5}\\)', '\\(x=\\pm\\sqrt{5}\\,i\\)', '\\(x=0, \\pm5i\\)'],
  a:0,
  e:'\\(x^2(x^2+5)=0\\)。\\(x^2=0\\) より \\(x=0\\)，\\(x^2=-5\\) より \\(x=\\pm\\sqrt{5}\\,i\\)。'
},
{
  q:'4次方程式 \\(x^4-x^2-20=0\\) を解いたとき，解の組合せとして正しいものを選べ。',
  c:['\\(x=\\pm\\sqrt{5},\\ \\pm2i\\)', '\\(x=\\pm\\sqrt{5},\\ \\pm2\\)', '\\(x=\\pm5,\\ \\pm2i\\)', '\\(x=\\pm\\sqrt{5}\\,i,\\ \\pm2\\)'],
  a:0,
  e:'\\(x^2=M\\) とおくと \\((M-5)(M+4)=0\\)。\\(M=5\\) より \\(x=\\pm\\sqrt{5}\\)，\\(M=-4\\) より \\(x=\\pm2i\\)。'
},

// ======== 問6 ======== 高次方程式の解法：因数分解[3ROUND数学Ⅱ 問題89]
// 次の3次方程式を解け。  x³+8=0
// 解答：x=−2, 1±√3 i
{
  q:'3次方程式 \\(x^3+8=0\\) を解いたとき，解の組合せとして正しいものを選べ。',
  c:['\\(x=-2,\\ 1\\pm\\sqrt{3}\\,i\\)', '\\(x=2,\\ -1\\pm\\sqrt{3}\\,i\\)', '\\(x=-2,\\ \\pm\\sqrt{3}\\,i\\)', '\\(x=-2,\\ 1\\pm\\sqrt{3}\\)'],
  a:0,
  e:'\\((x+2)(x^2-2x+4)=0\\)。\\(x=-2\\) または \\(x=\\dfrac{2\\pm\\sqrt{4-16}}{2}=1\\pm\\sqrt{3}\\,i\\)。'
},

// ======== 問7 ======== 3次方程式の解法：因数定理利用[ポイントノート数学Ⅱ 問題53]
// x³−x²−14x+24=0
// 解答：x=2, 3, −4
{
  q:'3次方程式 \\(x^3-x^2-14x+24=0\\) を解いたとき，解の組合せとして正しいものを選べ。',
  c:['\\(x=2, 3, -4\\)', '\\(x=-2, 3, 4\\)', '\\(x=2, -3, 4\\)', '\\(x=-2, -3, 4\\)'],
  a:0,
  e:'\\(P(2)=8-4-28+24=0\\) より \\(x-2\\) が因数。組立除法で \\(P(x)=(x-2)(x^2+x-12)=(x-2)(x-3)(x+4)\\)。よって \\(x=2, 3, -4\\)。'
},

// ======== 問8 ======== 3次方程式の解法：因数定理利用[ポイントノート数学Ⅱ 問題54]
// x³−x²−2x+8=0
// 解答：x=−2, (3±√7 i)/2
{
  q:'3次方程式 \\(x^3-x^2-2x+8=0\\) を解いたとき，解の組合せとして正しいものを選べ。',

// 解答：(1)x²+y²+2x−2y−3=0  (2)x²+y²−5x−y+4=0
{
  q:'3点 \\((-2,3),(1,0),(0,-1)\\) を通る円の方程式を求めよ。',
  c:['\\(x^2+y^2+2x-2y-3=0\\)', '\\(x^2+y^2-5x-y+4=0\\)', '\\(x^2+y^2+2x+2y-3=0\\)', '\\(x^2+y^2-2x+2y-3=0\\)'],
  a:0,
  e:'\\(x^2+y^2+lx+my+n=0\\) とおき，3点を代入。整理すると \\(l=2, m=-2, n=-3\\)。よって \\(x^2+y^2+2x-2y-3=0\\)。'
},
{
  q:'3点 \\((1,0),(3,2),(2,-1)\\) を通る円の方程式を求めよ。',
  c:['\\(x^2+y^2-5x-y+4=0\\)', '\\(x^2+y^2+2x-2y-3=0\\)', '\\(x^2+y^2-5x+y+4=0\\)', '\\(x^2+y^2+5x-y-4=0\\)'],
  a:0,
  e:'\\(x^2+y^2+lx+my+n=0\\) とおき，3点を代入して連立方程式を解くと \\(l=-5, m=-1, n=4\\)。よって \\(x^2+y^2-5x-y+4=0\\)。'
},

// ======== 問28 ======== x,yの2次方程式の表す図形：円[ポイントノート数学Ⅱ 問題108]

// (1)x²+y²−2x+4y−4=0  (2)x²+y²−4x+8y+4=0

  a:0,
  e:'\\((x-1)^2+(y+2)^2=1+4+4=9\\)，すなわち半径3。中心は \\((1,-2)\\)，半径3の円。'

  a:0,
  e:'\\((x-2)^2+(y+4)^2=4+16-4=16\\)，すなわち半径4。中心は \\((2,-4)\\)，半径4の円。'
},

// ======== 問29 ======== 直線の方程式の決定：線分の垂直二等分線[3ROUND数学Ⅱ 問題144]
// 2点A(−1,−2), B(2,7)を結ぶ線分ABの垂直二等分線の方程式を求めよ。
// 解答：y=−(1/3)x+8/3
{
  q:'2点 \\(A(-1,-2), B(2,7)\\) を結ぶ線分 \\(AB\\) の垂直二等分線の方程式を求めよ。',
  c:['\\(y=-\\dfrac{1}{3}x+\\dfrac{8}{3}\\)', '\\(y=3x+\\dfrac{1}{2}\\)', '\\(y=-\\dfrac{1}{3}x-\\dfrac{8}{3}\\)', '\\(y=\\dfrac{1}{3}x+\\dfrac{8}{3}\\)'],
  a:0,
  e:'直線 \\(AB\\) の傾き \\(=\\dfrac{7-(-2)}{2-(-1)}=3\\)。垂直二等分線の傾きは \\(-\\dfrac{1}{3}\\)。中点は \\(\\left(\\dfrac{1}{2},\\dfrac{5}{2}\\right)\\)。よって \\(y-\\dfrac{5}{2}=-\\dfrac{1}{3}\\left(x-\\dfrac{1}{2}\\right)\\)，整理して \\(y=-\\dfrac{1}{3}x+\\dfrac{8}{3}\\)。'

]; // AQ end

// ========================
// レベルデータ
// ========================
const LV=[
  {lv:1, n:'見習い数学者🧙',    s:'解と係数の関係術', expNext:100},
  {lv:2, n:'方程式の使い手📜',  s:'因数分解の秘術',   expNext:150},
  {lv:3, n:'高次方程式士🔢',    s:'因数定理召喚',     expNext:200},
  {lv:4, n:'座標の探索者📍',    s:'距離の公式術',     expNext:250},
  {lv:5, n:'内分の達人⚗️',      s:'内外分点の理',     expNext:300},
  {lv:6, n:'直線の魔法師📏',    s:'直線方程式術',     expNext:350},
  {lv:7, n:'距離の賢者🔵',      s:'点と直線の距離',   expNext:400},
  {lv:8, n:'円方程式の達人🟣',  s:'円の標準形変換',   expNext:450},
  {lv:9, n:'上級数学士🏅',      s:'円の三点決定術',   expNext:500},
  {lv:10,n:'伝説の賢者👑',      s:'全知全能の理',     expNext:999999}
];

// ========================
// ゲーム変数
// ========================
const SCREENS=['sTitle','sGame','sLvUp','sResult'];
let SI=0, sets=[], total=0, qs=[], cur=0;
let hp=100, ep=0, sc=0, ok=0, lv=1, dd=[];

function showScreen(id){
  SCREENS.forEach(x=>{
    const el=document.getElementById(x);
    if(x===id) el.classList.remove('hidden');
    else        el.classList.add('hidden');
  });
}

function fy(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [r[i],r[j]]=[r[j],r[i]];
  }
  return r;
}

function buildSets(){
  const s=fy(AQ.map((_,i)=>i));
  const n=s.length;
  return[
    s.slice(0, Math.ceil(n/3)),
    s.slice(Math.ceil(n/3), Math.ceil(n/3)*2),
    s.slice(Math.ceil(n/3)*2)
  ];
}

function startGame(){
  SI=0;
  sets=buildSets();
  showScreen('sGame');
  newGame();
}

function newGame(){
  showScreen('sGame');
  hp=100; ep=0; sc=0; ok=0; lv=1; dd=[];
  const idx=sets[SI];
  total=idx.length;
  qs=idx.map(i=>({
    ...AQ[i],
    sh: fy([...Array(AQ[i].c.length).keys()]).map(k=>({t:AQ[i].c[k], o:k}))
  }));
  cur=0;
  updateStatus();
  showQ();
}

function mjTypeset(el){
  function run(){
    if(window.MathJax && typeof MathJax.typesetPromise==='function'){
      MathJax.typesetClear([el]);
      MathJax.typesetPromise([el]).catch(()=>{});
    } else {
      setTimeout(run, 80);
    }
  }
  run();
}

function showQ(){
  const q=qs[cur];
  const labels=['ア','イ','ウ','エ'];
  const badges=['badge-a','badge-b','badge-c','badge-d'];

  document.getElementById('qNum').textContent=`Q ${cur+1} / ${total}　（第${SI+1}周）`;

  const qt=document.getElementById('qText');
  qt.textContent=q.q;

  const ch=document.getElementById('choices');
  ch.innerHTML='';
  q.sh.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="badge ${badges[i]}">${labels[i]}</span><span class="choice-text"></span>`;
    btn.querySelector('.choice-text').textContent=s.t;
    btn.onclick=()=>answer(i);
    ch.appendChild(btn);
  });

  document.getElementById('expl').classList.add('hidden');
  document.getElementById('btnNext').classList.add('hidden');

  const dots=document.getElementById('dots');
  dots.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='dot'
      +(i<dd.length ? (dd[i]?' ok':' ng') : '')
      +(i===cur?' cur':'');
    dots.appendChild(d);
  }

  const card=document.getElementById('qCard');
  mjTypeset(card);
  window.scrollTo({top:0, behavior:'smooth'});
}

function answer(choiceIdx){
  const q=qs[cur];
  const chosen=q.sh[choiceIdx];
  const isOk=(chosen.o===q.a);

  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach((b,i)=>{
    b.disabled=true;
    const orig=q.sh[i].o;
    if(orig===q.a)    b.classList.add('correct');
    else if(i===choiceIdx) b.classList.add('wrong');
  });

  if(isOk){
    ok++; sc+=100;
    ep+=40;
    popup('+40 EXP','exp');
    checkLvUp();
  } else {
    hp=Math.max(0, hp-10);
    popup('-10 HP','dmg');
    const card=document.getElementById('qCard');
    card.classList.add('flash');
    setTimeout(()=>card.classList.remove('flash'), 400);
  }
  dd.push(isOk);
  updateStatus();

  const expl=document.getElementById('expl');
  expl.className='expl '+(isOk?'ok':'ng');
  expl.innerHTML=`<div class="expl-title">${isOk?'✅ 正解！':'❌ 不正解'}</div><div class="expl-body" id="explBody"></div>`;
  document.getElementById('explBody').textContent=q.e;
  expl.classList.remove('hidden');
  mjTypeset(expl);

  document.getElementById('btnNext').classList.remove('hidden');

  const allDots=document.getElementById('dots').querySelectorAll('.dot');
  if(allDots[cur]) allDots[cur].className='dot '+(isOk?'ok':'ng');
}

function popup(txt,cls){
  const p=document.createElement('div');
  p.className='popup '+cls;
  p.textContent=txt;
  const app=document.getElementById('app');
  p.style.left='50%';
  p.style.transform='translateX(-50%)';
  p.style.top='120px';
  app.appendChild(p);
  setTimeout(()=>p.remove(), 950);
}

function checkLvUp(){
  const curLvData=LV[lv-1];
  if(ep>=curLvData.expNext && lv<LV.length){
    ep-=curLvData.expNext;
    lv++;
    showLvUp(LV[lv-1]);
  }
}

function showLvUp(ld){
  document.getElementById('lut').textContent='Lv'+lv+' に昇格！';
  document.getElementById('lub').textContent=ld.n;
  document.getElementById('lusk').textContent='新スキル：「'+ld.s+'」を習得！';
  showScreen('sLvUp');
}

function dismissLv(){
  showScreen('sGame');
}

function nextQ(){
  cur++;
  if(cur>=total){ showResult(); return; }
  showQ();
}

function updateStatus(){
  const hpPct=hp;
  const bHp=document.getElementById('bHp');
  bHp.style.width=hpPct+'%';
  bHp.style.background=hpPct>60?'#22c55e':hpPct>30?'#f59e0b':'#ef4444';
  document.getElementById('nHp').textContent=hp+'/100';

  const curLvData=LV[lv-1];
  const epPct=Math.min(100, Math.round(ep/curLvData.expNext*100));
  document.getElementById('bExp').style.width=epPct+'%';
  document.getElementById('nExp').textContent=ep+'/'+curLvData.expNext;

  document.getElementById('lvBadge').textContent='Lv'+lv+' '+LV[lv-1].n.slice(-2);
  document.getElementById('scBadge').textContent=sc+'点';
}

function showResult(){
  const acc=total>0 ? Math.round(ok/total*100) : 0;
  document.getElementById('resScore').textContent=sc;
  document.getElementById('resOk').textContent=ok+'/'+total;
  document.getElementById('resAcc').textContent=acc+'%';
  document.getElementById('resHp').textContent=hp;

  const roundLabel=['第1周','第2周','第3周'];
  document.getElementById('resRound').textContent=roundLabel[SI]+' / 全3周（'+total+'問セット）';

  let icon,title,btnTxt;
  if(SI===0){icon='⭐';title='第1周クリア！';btnTxt='第2周へ進む（残り2周）▶';}
  else if(SI===1){icon='🌟';title='第2周クリア！';btnTxt='第3周へ進む（残り1周）▶';}
  else{icon='👑';title='全3周コンプリート！全問に触れました';btnTxt='最初から全部やり直す 🔄';}

  document.getElementById('resIcon').textContent=icon;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('btnNextRound').textContent=btnTxt;
  showScreen('sResult');
}

function onResult(){
  if(SI<2){ SI++; newGame(); }
  else{ SI=0; sets=buildSets(); newGame(); }
}
</script>
</body>
</html>
